<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página no encontrada — TopUp Zone</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%237c3aed'/><text y='24' x='4' font-size='22'>⚡</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d14;
      --accent: #7c3aed;
      --accent-cyan: #06b6d4;
      --text: #f1f1ff;
      --muted: #6c6c8a;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,58,237,0.2) 0%, transparent 60%), var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .wrap {
      max-width: 480px;
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .icon {
      font-size: 5rem;
      margin-bottom: 1rem;
      display: block;
      animation: pulse 2s ease infinite;
    }
    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50%      { transform: scale(1.08); }
    }
    .code {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 6rem;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
    }
    p {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 2rem;
      background: linear-gradient(135deg, var(--accent), #9f5fff);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.02em;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(124,58,237,0.4);
    }
    .counter {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--muted);
    }
    #secs { font-weight: 700; color: var(--accent-cyan); }
  </style>
</head>
<body>
  <div class="wrap">
    <span class="icon">⚡</span>
    <div class="code">404</div>
    <h1>Página no encontrada</h1>
    <p>La página que buscas no existe o fue movida.<br>Te llevamos de vuelta al inicio automáticamente.</p>
    <a href="./index.html" class="btn" id="home-btn">⚡ Ir a TopUp Zone</a>
    <div class="counter">Redirigiendo en <span id="secs">5</span> segundos…</div>
  </div>
  <script>
    let s = 5;
    const el = document.getElementById('secs');
    const timer = setInterval(() => {
      s--;
      el.textContent = s;
      if (s <= 0) {
        clearInterval(timer);
        window.location.href = './index.html';
      }
    }, 1000);
    // Si hacen click en el botón, cancelar el timer
    document.getElementById('home-btn').addEventListener('click', () => clearInterval(timer));
  </script>
</body>
</html>
